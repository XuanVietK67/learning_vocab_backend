name: CI / Deploy

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --passWithNoTests

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      # Each `up` uploads this (already-tested) commit and builds it on Railway.
      # The api service runs migrations via its pre-deploy command before cutover.
      # Service names must match those created in the Railway project.
      - name: Deploy api
        run: railway up --ci --service api

      - name: Deploy worker
        run: railway up --ci --service worker
